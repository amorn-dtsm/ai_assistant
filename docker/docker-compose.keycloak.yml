# Keycloak SSO add-on for AnythingLLM.
#
# Usage (from the ./docker directory):
#   docker compose -f docker-compose.yml -f docker-compose.keycloak.yml up -d
#
# Prerequisites (see ../keycloak-sso-relay/README.md for the full guide):
#   1. AnythingLLM is in multi-user mode (complete onboarding, create an admin).
#   2. SIMPLE_SSO_ENABLED=1 is set in ./docker/.env (and optionally SIMPLE_SSO_NO_LOGIN=1).
#   3. A developer API key was generated in AnythingLLM and exported as
#      ANYTHINGLLM_API_KEY (e.g. in this directory's .env file).
#   4. The Keycloak realm/client below was configured (realm "anythingllm",
#      confidential client "anythingllm-relay" with redirect URI
#      http://localhost:3002/oidc/callback).
#
# The bundled Keycloak runs in DEV MODE with an in-memory H2 database - for
# local evaluation only. Point KEYCLOAK_ISSUER at your real Keycloak in
# production and delete the keycloak service from this file.

services:
  anything-llm:
    environment:
      KEYCLOAK_OIDC_ISSUER: ${KEYCLOAK_ISSUER:-}
      KEYCLOAK_OIDC_CLIENT_ID: ${KEYCLOAK_SPA_CLIENT_ID:-anythingllm-spa}
      KEYCLOAK_ROLE_ADMIN: ${KEYCLOAK_ROLE_ADMIN:-anythingllm-admin}
      KEYCLOAK_ROLE_MANAGER: ${KEYCLOAK_ROLE_MANAGER:-anythingllm-manager}

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    container_name: anythingllm-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      # Pin the issuer to a hostname reachable by BOTH the browser and the
      # relay container. Docker Desktop resolves host.docker.internal on the
      # host machine too; on Linux add "127.0.0.1 host.docker.internal" to /etc/hosts.
      KC_HOSTNAME: http://host.docker.internal:8080
    ports:
      - "8080:8080"
    networks:
      - anything-llm

  keycloak-sso-relay:
    container_name: anythingllm-keycloak-relay
    build:
      context: ../keycloak-sso-relay
    environment:
      PORT: 3002
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://host.docker.internal:8080/realms/anythingllm}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-anythingllm-relay}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me}
      KEYCLOAK_ROLE_ADMIN: ${KEYCLOAK_ROLE_ADMIN:-anythingllm-admin}
      KEYCLOAK_ROLE_MANAGER: ${KEYCLOAK_ROLE_MANAGER:-anythingllm-manager}
      RELAY_PUBLIC_URL: ${RELAY_PUBLIC_URL:-http://localhost:3002}
      ANYTHINGLLM_API_URL: http://anything-llm:3001
      ANYTHINGLLM_PUBLIC_URL: ${ANYTHINGLLM_PUBLIC_URL:-http://localhost:3001}
      ANYTHINGLLM_API_KEY: ${ANYTHINGLLM_API_KEY:?Set ANYTHINGLLM_API_KEY to an AnythingLLM developer API key}
      JIT_PROVISIONING: ${JIT_PROVISIONING:-true}
      ROLE_SYNC: ${ROLE_SYNC:-true}
    ports:
      - "3002:3002"
    networks:
      - anything-llm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - keycloak
      - anything-llm
